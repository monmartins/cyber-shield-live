# Override: modo PREVENÇÃO — ataques são BLOQUEADOS (HTTP 403)
SecRuleEngine On

# Logging apenas de eventos relevantes (bloqueios e alertas)
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial

# ── Paranoia Level ─────────────────────────────────────────────────────────────
# PL1 (default) — boa cobertura com poucos falsos positivos para apps de lab
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=1"

# ── Thresholds de pontuação anomaly ───────────────────────────────────────────
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# ── Regra customizada: NoSQL operator injection via query string ───────────────
SecRule ARGS "@rx \$(?:ne|gt|lt|gte|lte|in|nin|regex|where|exists|all|size|type|mod|text|near|geoWithin|geoIntersects|elemMatch|not|nor|or|and)\b" \
    "id:9000001,\
    phase:2,\
    block,\
    msg:'NoSQL Operator Injection Attempt (query param)',\
    logdata:'Matched Data: %{MATCHED_VAR} in %{MATCHED_VAR_NAME}',\
    tag:'attack-nosql',\
    severity:'CRITICAL'"

# ── Regra customizada: NoSQL operator injection via request body ───────────────
SecRule REQUEST_BODY "@rx \$(?:ne|gt|lt|gte|lte|in|nin|regex|where|exists)\b" \
    "id:9000002,\
    phase:2,\
    block,\
    msg:'NoSQL Operator Injection Attempt (request body)',\
    logdata:'Matched Data: %{MATCHED_VAR}',\
    tag:'attack-nosql',\
    severity:'CRITICAL'"

# ── Regra customizada: HTML/XML entity encoding SQLi bypass (VULN-18) ─────────
SecRule ARGS "@rx (?:&#x27;|&#39;|&apos;|&#x22;)" \
    "id:9000003,\
    phase:2,\
    block,\
    msg:'HTML/XML Entity Encoding SQLi Bypass Attempt',\
    logdata:'Matched Data: %{MATCHED_VAR} in %{MATCHED_VAR_NAME}',\
    tag:'attack-sqli-bypass',\
    severity:'ERROR'"

# ── Regra customizada: SQLi em corpo XML ──────────────────────────────────────
SecRule XML://* "@rx (?i)(?:'|--|;|\bUNION\b|\bSELECT\b|\bINSERT\b|\bDROP\b|\bDELETE\b|\bUPDATE\b|\bOR\b\s+\d)" \
    "id:9000004,\
    phase:2,\
    block,\
    msg:'SQL Injection Detected in XML Body',\
    logdata:'Matched Data: %{MATCHED_VAR}',\
    tag:'attack-sqli-xml',\
    severity:'CRITICAL'"
