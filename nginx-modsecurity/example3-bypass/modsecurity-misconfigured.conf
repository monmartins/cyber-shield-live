# ── MISCONFIG-3 ────────────────────────────────────────────────────────────────
# "Alguns uploads grandes estavam travando o ModSecurity e derrubando o nginx.
#  Reduzimos o limite de inspeção do body para 512 bytes para evitar OOM."
#
# Problema: o payload SQLi ou NoSQL pode ser colocado após os primeiros 512 bytes.
# O ModSecurity inspeciona apenas os primeiros 512 bytes e ignora o resto.
# sqlmap com --data de payload longo ou base64-padded supera esse limite facilmente.
SecRequestBodyLimit 512
SecRequestBodyNoFilesLimit 512
SecRequestBodyLimitAction ProcessPartial
