# ═══════════════════════════════════════════════════════════════════════════════
# EXEMPLO 3 — WAF MAL CONFIGURADO (nginx + ModSecurity)
#
# Este arquivo simula 3 misconfigs reais que criam bypasses exploráveis.
#
# MISCONFIG-1: User-Agent "HealthCheck" desliga o WAF completamente
# MISCONFIG-2: SecRuleRemoveById desativa as principais regras de SQLi
# MISCONFIG-3: SecRequestBodyLimit muito baixo (body grande não inspecionado)
#
# Veja misconfiguration.md para análise detalhada.
# Veja attack.md para o passo a passo do bypass.
# ═══════════════════════════════════════════════════════════════════════════════

# Modo bloqueio — parece seguro
SecRuleEngine On

SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial

# ── MISCONFIG-1 ────────────────────────────────────────────────────────────────
# "Precisamos que o Prometheus/healthcheck consiga acessar sem disparar alertas.
#  Adicionamos uma exceção para o User-Agent do nosso sistema de monitoramento."
#
# Problema: qualquer atacante pode enviar esse User-Agent.
# O header User-Agent não é autenticado — é trivial falsificá-lo.
# A diretiva ctl:ruleEngine=Off desliga TODO o ModSecurity para aquela request.
SecRule REQUEST_HEADERS:User-Agent "@contains HealthCheck" \
    "id:9000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    msg:'Monitoring bypass activated'"

# Variante igualmente vulnerável que alguns admins usam:
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(?:monitor|scanner|probe|internal|uptime|nagios|zabbix)" \
    "id:9001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off,\
    msg:'Internal tool bypass activated'"

# ── MISCONFIG-2 ────────────────────────────────────────────────────────────────
# "As regras 942100–942500 estavam causando muitos 403 nos relatórios do BI.
#  O time de dados pediu para desativar temporariamente até encontrarmos
#  as regras específicas que causam problema."
#
# Problema: as regras 942xxx são TODA a proteção contra SQL injection do CRS.
# Desativar o bloco inteiro equivale a remover a defesa principal contra SQLi.
SecRuleRemoveById 942100
SecRuleRemoveById 942110
SecRuleRemoveById 942120
SecRuleRemoveById 942130
SecRuleRemoveById 942140
SecRuleRemoveById 942150
SecRuleRemoveById 942160
SecRuleRemoveById 942170
SecRuleRemoveById 942180
SecRuleRemoveById 942190
SecRuleRemoveById 942200
