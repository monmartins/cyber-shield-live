# Override: modo DETECÇÃO apenas
# Os ataques são logados mas NÃO bloqueados.
# Substitui o SecRuleEngine da configuração base do container owasp/modsecurity-nginx.

SecRuleEngine DetectionOnly

# Logging completo para análise
SecAuditEngine On
SecAuditLog /var/log/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
